# ============================================
# docker-compose.yml — Download Monitor Stack
# ============================================
# Usage: docker-compose up -d
# Dashboard: http://localhost:3000
# API: http://localhost:8000/docs

version: "3.8"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: download_monitor
      POSTGRES_USER: dlmon
      POSTGRES_PASSWORD: dlmon_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Redis (Celery broker) ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── FastAPI Backend ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dlmon:dlmon_secret@postgres/download_monitor
      REDIS_URL: redis://redis:6379/0
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      DASHBOARD_URL: http://localhost:3000
      S3_BUCKET: ${S3_BUCKET:-download-monitor-screenshots}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    depends_on:
      - postgres
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (task dispatcher) ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://dlmon:dlmon_secret@postgres/download_monitor
      REDIS_URL: redis://redis:6379/0
      S3_BUCKET: ${S3_BUCKET:-download-monitor-screenshots}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    depends_on:
      - postgres
      - redis
    command: celery -A tasks worker --loglevel=info --concurrency=4

  # ── React Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:

